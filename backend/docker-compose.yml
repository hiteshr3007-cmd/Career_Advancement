services:
  db:
    image: pgvector/pgvector:pg16
    container_name: career_platform_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: career_platform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d career_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: career_platform_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Defaults to the local `db` container above. To point this API at a
      # shared/external database instead (e.g. a Neon/Supabase project so a
      # team sees the same data), set DOCKER_DATABASE_URL in .env to that
      # connection string and start with `docker compose up --no-deps -d api`
      # so the local db container isn't started at all.
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg2://platform:platform@db:5432/career_platform}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./phase3:/app/phase3
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
